<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>ICONE.DocAdmin v5</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/main.css?v=20260510j">
<style>
  #boot-fallback{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
    background:linear-gradient(135deg,#1B2745,#3055A6);color:#fff;flex-direction:column;gap:12px;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;z-index:99999}
  #boot-fallback .spinner{width:42px;height:42px;border:3px solid rgba(255,255,255,.2);
    border-top-color:#00B7C6;border-radius:50%;animation:spin .9s linear infinite}
  #boot-fallback h1{font-size:18px;font-weight:700}
  #boot-fallback .err{background:#C62828;color:#fff;padding:10px 14px;border-radius:8px;
    font-size:12px;max-width:520px;text-align:left;white-space:pre-wrap;font-family:monospace}
  @keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div id="boot-fallback">
  <div class="spinner"></div>
  <h1>📚 ICONE.DocAdmin v5</h1>
  <div style="font-size:12px;opacity:.85" id="boot-msg">Cargando módulos…</div>
  <div id="boot-err" class="err" style="display:none"></div>
</div>

<!-- ───────────── LOGIN SCREEN ───────────── -->
<div x-data x-show="$store.app.user===null" x-cloak class="login-bg">
  <div class="login-card" x-data="loginForm()">
    <h1>📚 ICONE.DocAdmin</h1>
    <div class="sub">Gestión docente con IA · v5</div>
    <template x-if="error"><div class="login-error" x-text="error"></div></template>
    <form @submit.prevent="submit">
      <div class="field">
        <label>Email institucional</label>
        <input type="email" x-model="email" required autocomplete="email">
      </div>
      <div class="field">
        <label>Contraseña</label>
        <input type="password" x-model="password" required autocomplete="current-password">
      </div>
      <button class="btn btn-lg" style="width:100%" :disabled="loading">
        <template x-if="loading"><span class="loader"></span></template>
        <span x-text="loading?'Entrando...':'Entrar'"></span>
      </button>
      <div style="margin-top:14px;text-align:center;font-size:12px;color:var(--ean-gray)">
        <a href="#" @click.prevent="signup" style="color:var(--ean-blue)">¿Sin cuenta? Regístrate</a>
      </div>
    </form>
  </div>
</div>

<!-- ───────────── APP MAIN ───────────── -->
<div x-data="{ drawerOpen: false }" x-show="$store.app.user" x-cloak class="app">
  <!-- Botón hamburger (solo visible en mobile via CSS) -->
  <button class="menu-toggle" @click="drawerOpen = !drawerOpen" aria-label="Abrir menú" :aria-expanded="drawerOpen">
    <span x-show="!drawerOpen">☰</span>
    <span x-show="drawerOpen" x-cloak>✕</span>
  </button>
  <!-- Overlay (cierra drawer al tocar fuera) -->
  <div class="sidebar-overlay" x-show="drawerOpen" @click="drawerOpen = false" x-cloak></div>

  <aside class="sidebar" :class="{ 'sidebar-open': drawerOpen }">
    <div class="sidebar-brand">📚 ICONE.DocAdmin <span style="opacity:.5;font-weight:400">v5</span></div>
    <div class="sidebar-section">Cursos</div>
    <nav @click="drawerOpen = false">
      <button :class="{active:$store.app.view==='courses'}" @click="$store.app.go('courses')">📋 Mis cursos</button>
    </nav>
    <template x-if="$store.app.activeCourse">
      <div>
        <div class="sidebar-section" x-text="$store.app.activeCourse.name"></div>
        <nav @click="drawerOpen = false">
          <button :class="{active:$store.app.view==='students'}" @click="$store.app.go('students')">👥 Estudiantes</button>
          <button :class="{active:$store.app.view==='groups'}" @click="$store.app.go('groups')">🧑‍🤝‍🧑 Grupos</button>
          <button :class="{active:$store.app.view==='activities'}" @click="$store.app.go('activities')">📝 Actividades y notas</button>
          <button :class="{active:$store.app.view==='ingest'}" @click="$store.app.go('ingest')">🤖 Ingesta IA</button>
          <button :class="{active:$store.app.view==='asistencia'}" @click="$store.app.go('asistencia')">📅 Asistencia</button>
          <button :class="{active:$store.app.view==='sustentacion'}" @click="$store.app.go('sustentacion')">🏆 Sustentación</button>
          <button :class="{active:$store.app.view==='conAsistencia'}" @click="$store.app.go('conAsistencia')">📋 Consolidado Asistencia</button>
          <button :class="{active:$store.app.view==='consolidated'}" @click="$store.app.go('consolidated')">📊 Consolidado Notas</button>
          <button :class="{active:$store.app.view==='syllabus'}" @click="$store.app.go('syllabus')">📅 Plan del semestre</button>
          <button :class="{active:$store.app.view==='chat'}" @click="$store.app.go('chat')">💬 AI Chat</button>
        </nav>
      </div>
    </template>
    <div style="padding:14px 18px;font-size:11px;color:rgba(255,255,255,.5);border-top:1px solid rgba(255,255,255,.08);margin-top:auto">
      <div x-text="$store.app.user?.email" style="margin-bottom:6px;word-break:break-all"></div>
      <a href="#" @click.prevent="$store.app.signOut()" style="color:rgba(255,255,255,.7)">Cerrar sesión →</a>
    </div>
  </aside>
  <main class="main">
    <header class="topbar">
      <div class="topbar-title" x-text="$store.app.viewTitle()"></div>
      <div class="topbar-right">
        <template x-if="$store.app.activeCourse">
          <span>📘 <b x-text="$store.app.activeCourse.name"></b></span>
        </template>
        <button class="plan-btn" @click="$store.app.openPlan()"
          :style="`--plan-color:${$store.app.planColor()}`"
          title="Click para ver tu plan y opciones de upgrade">
          <span class="plan-icon" x-text="$store.app.planIcon()"></span>
          <span class="plan-text">
            <span class="plan-name" x-text="$store.app.planLabel()"></span>
            <span class="plan-sub">Este es tu plan</span>
          </span>
        </button>
      </div>
    </header>
    <div class="content">
      <div id="view-root"></div>
    </div>
  </main>
</div>

<!-- Sugerencia rotar a horizontal — solo mobile portrait, dismiss persistente -->
<div class="rotate-hint" x-data="{
       show: window.matchMedia('(max-width:768px) and (orientation:portrait)').matches
             && !localStorage.getItem('docadmin_rotate_dismissed'),
       dismiss(){ this.show = false; localStorage.setItem('docadmin_rotate_dismissed','1'); }
     }"
     x-init="window.matchMedia('(orientation:landscape)').addEventListener('change', e => { if (e.matches) show = false });
             window.matchMedia('(orientation:portrait)').addEventListener('change', e => { if (e.matches && !localStorage.getItem('docadmin_rotate_dismissed')) show = true })"
     x-show="show" x-transition x-cloak>
  <span class="rotate-icon">📱</span>
  <div class="rotate-text">
    <b>Mejor en horizontal</b>
    <span>Gira tu celular para ver más contenido</span>
  </div>
  <button class="rotate-close" @click="dismiss()" aria-label="Cerrar sugerencia">✕</button>
</div>

<!-- Captura errores y los muestra -->
<script>
  function showBootErr(msg){
    const box = document.getElementById('boot-err');
    if (!box) return;
    box.style.display = 'block';
    box.textContent = '❌ ' + msg;
  }
  window.addEventListener('error', e => {
    showBootErr((e.message||'Error') + (e.filename?'\n@ '+e.filename.split('/').pop()+':'+e.lineno:''));
  });
  window.addEventListener('unhandledrejection', e => {
    showBootErr('Promise: ' + (e.reason?.message || e.reason || 'unknown'));
  });
</script>

<!-- Supabase UMD — defer para no bloquear parsing; carga antes de main.js (también defer) -->
<script defer src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.7/dist/umd/supabase.min.js" crossorigin="anonymous"
  onerror="showBootErr('No cargó Supabase desde CDN. ¿Sin internet?')"></script>

<!-- XLSX — defer (270 KiB, solo se usa al exportar; no debe bloquear LCP) -->
<script defer src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js" crossorigin="anonymous"
  onerror="showBootErr('No cargó XLSX desde CDN.')"></script>

<!-- Red neuronal sutil de fondo — defer (incluye guard mobile + reduced-motion internos) -->
<script defer src="js/neural-bg.js?v=20260510j"></script>

<!-- Mi módulo principal — type=module ya es defer-by-default -->
<script type="module" src="js/main.js?v=20260510j"></script>

</body>
</html>
